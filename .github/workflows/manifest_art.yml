name: Manifest Art Persona

on:
  workflow_dispatch:

jobs:
  initialize-art:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write 
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install openai requests

      - name: Execute Autonomous Manifestation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python art_core.py

      - name: Commit Artifacts
        run: |
          git config --global user.name "Art-Agent"
          git config --global user.email "art@prophecy.com"
          
          # Add the file (if it exists)
          git add art_logo.png || true
          
          # Check if there are staged changes. If yes, commit and push. If no, skip gracefully.
          git diff --staged --quiet || (git commit -m "Art has manifested its own logo" && git push)
